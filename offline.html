<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | MIAUDITOPS</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #0f172a; min-height: 100vh; display:flex; align-items:center; justify-content:center; }
        .offline-card {
            text-align: center; padding: 3rem 2rem;
            background: #1e293b; border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid #334155; max-width: 400px;
        }
        .icon { font-size: 3rem; margin-bottom: 1rem; }
        h1 { font-size: 1.5rem; font-weight: 800; color: #f1f5f9; margin-bottom: 0.5rem; }
        p { color: #94a3b8; font-size: 0.95rem; line-height: 1.6; margin-bottom: 1.5rem; }
        .btn { display:inline-block; padding:12px 28px; background:#6d28d9; color:white; border:none; border-radius:12px; font-weight:700; font-size:0.95rem; cursor:pointer; text-decoration:none; }
        .btn:hover { background:#5b21b6; }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="icon">📡</div>
        <h1>You're Offline</h1>
        <p>It looks like you've lost your internet connection. Please check your network and try again.</p>
        <button class="btn" onclick="location.reload()">Try Again</button>
    </div>
</body>
</html>
